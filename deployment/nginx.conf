# Nginx configuration for Astrology LLM API
# Place in: /etc/nginx/sites-available/astrology-api
#
# Enable: ln -s /etc/nginx/sites-available/astrology-api /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

upstream astrology_api {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name astrology.example.com;

    # ---- API endpoints ----
    location /v1/chat/completions {
        proxy_pass http://astrology_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming support
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /v1/completions {
        proxy_pass http://astrology_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://astrology_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Static / docs ----
    location / {
        return 404;
    }

    # ---- Security ----
    client_max_body_size 10M;
    proxy_hide_header X-Powered-By;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ---- Rate limiting ----
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req zone=api burst=20 nodelay;
}

